syntax = "proto3";

package api;

option go_package = "github.com/go-chromium-core/gcc/api";

service NetworkService {
  rpc FetchResource (FetchRequest) returns (FetchResponse);
  rpc OpenWebSocket (stream WSMessage) returns (stream WSMessage);
}

message FetchRequest {
  string url = 1;
  string method = 2;
  map<string, string> headers = 3;
  bytes body = 4;
}

message FetchResponse {
  int32 status_code = 1;
  map<string, string> headers = 2;
  bytes body = 3;
  string error_message = 4;
}

message WSMessage {
  string url = 1; // Only used in the first handshake request
  bytes payload = 2;
  bool is_close = 3;
}
