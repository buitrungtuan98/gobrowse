syntax = "proto3";

package api;

option go_package = "github.com/go-chromium-core/gcc/api";

service NetworkService {
  rpc FetchResource (FetchRequest) returns (FetchResponse);
}

message FetchRequest {
  string url = 1;
  string method = 2;
  map<string, string> headers = 3;
  bytes body = 4;
}

message FetchResponse {
  int32 status_code = 1;
  map<string, string> headers = 2;
  bytes body = 3;
  string error_message = 4;
}
